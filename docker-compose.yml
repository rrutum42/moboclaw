services:
  moboclaw:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    volumes:
      - sqlite-data:/app/data
    environment:
      EMULATOR_WARM_POOL_SIZE: "3"
      EMULATOR_RESTORE_FROM_SNAPSHOT_SECONDS: "2.5"
      EMULATOR_COLD_BOOT_SECONDS: "8"
      EMULATOR_HEALTH_CHECK_INTERVAL_SECONDS: "3"
      EMULATOR_MOCK_UNHEALTHY_PROBABILITY: "0.05"
      EMULATOR_MAX_HEALTH_FAILURES_BEFORE_REPLACE: "2"
      SESSION_DATABASE_URL: sqlite+aiosqlite:////app/data/sessions.db
      SESSION_SEED_DUMMY_ON_EMPTY: "true"
      SESSION_TIER_HOT_ACCESS_SECONDS: "120"
      SESSION_TIER_WARM_ACCESS_SECONDS: "600"
      SESSION_HOT_CHECK_INTERVAL_SECONDS: "60"
      SESSION_WARM_CHECK_INTERVAL_SECONDS: "300"
      SESSION_WORKER_TICK_SECONDS: "15"

volumes:
  sqlite-data:
